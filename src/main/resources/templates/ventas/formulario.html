<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Registrar Venta')}"></head>
<style>
.venta-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.venta-form-grid .full-width { grid-column:1/-1; }

/* ── Estilos ── */
.estilo-cards { display:flex; gap:10px; flex-wrap:wrap; }
.estilo-card input[type="radio"] { display:none; }
.estilo-card label {
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:12px 20px; border:2px solid var(--border); border-radius:10px;
    cursor:pointer; transition:all .2s; font-size:.85rem; font-weight:600;
    color:var(--text-muted); background:var(--bg); min-width:100px; text-align:center;
}
.estilo-card input:checked + label {
    border-color:var(--primary); background:#eff6ff; color:var(--primary);
    box-shadow:0 0 0 3px rgba(37,99,235,.12);
}
.estilo-icon { font-size:1.5rem; }

/* ── Colores ── */
.color-cards { display:flex; gap:10px; flex-wrap:wrap; }
.color-card input[type="radio"] { display:none; }
.color-card label {
    display:flex; flex-direction:column; align-items:center; gap:8px;
    padding:12px 16px; border:2px solid var(--border); border-radius:10px;
    cursor:pointer; transition:all .2s; font-size:.82rem; font-weight:600;
    color:var(--text-muted); background:var(--bg); min-width:80px; text-align:center;
}
.color-card input:checked + label {
    border-color:var(--primary); background:#eff6ff; color:var(--primary);
    box-shadow:0 0 0 3px rgba(37,99,235,.12);
}
.color-swatch { width:36px; height:36px; border-radius:50%; border:2px solid rgba(0,0,0,.12); }
.swatch-NEGRO  { background:#1e1e1e; }
.swatch-CAFE   { background:#7c5c3d; }
.swatch-GENA   { background:linear-gradient(135deg,#a8edea,#fed6e3); }
.swatch-BEIGE  { background:#d4b896; }
.swatch-BLANCO { background:#f0f0f0; }

/* ── Tallas ── */
.talla-cards { display:flex; gap:8px; flex-wrap:wrap; }
.talla-card input[type="radio"] { display:none; }
.talla-card label {
    width:52px; height:52px; display:flex; align-items:center; justify-content:center;
    border:2px solid var(--border); border-radius:10px; cursor:pointer;
    font-size:1rem; font-weight:600; color:var(--text-muted); background:var(--bg); transition:all .2s;
}
.talla-card input:checked + label {
    border-color:var(--primary); background:#eff6ff; color:var(--primary);
    box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

/* ── Estado pills ── */
.estado-pills { display:flex; gap:8px; flex-wrap:wrap; }
.estado-pill input[type="radio"] { display:none; }
.estado-pill label {
    padding:8px 18px; border-radius:99px; border:2px solid var(--border);
    cursor:pointer; font-size:.85rem; font-weight:600; transition:all .2s;
    background:var(--bg); color:var(--text-muted);
}
.estado-pill input:checked + label { color:#fff; border-color:transparent; }
.pill-PAGADO    input:checked + label { background:#16a34a; }
.pill-ENVIADO   input:checked + label { background:#0284c7; }
.pill-PEDIDO   input:checked + label { background:#7c3aed; }
.pill-ENTREGADO input:checked + label { background:#0f766e; }
.pill-DEVOLUCION input:checked + label { background:#d97706; }
.pill-CANCELADO input:checked + label { background:#dc2626; }
.pill-INVENTARIO input:checked + label { background:#6366f1; }

/* ── Resumen ── */
.resumen-card {
    background:linear-gradient(135deg,#1e293b,#334155); color:#fff;
    border-radius:12px; padding:20px 24px; display:flex; flex-direction:column;
    gap:10px; margin-bottom:24px; max-width:900px; margin-left:auto; margin-right:auto;
}
.resumen-card h3 { font-size:1rem; color:#94a3b8; margin-bottom:4px; }
.resumen-row { display:flex; justify-content:space-between; font-size:.9rem; color:#cbd5e1; }
.resumen-total {
    border-top:1px solid #475569; padding-top:10px; font-size:1.3rem;
    font-weight:700; color:#4ade80; display:flex; justify-content:space-between;
}

/* ── Secciones ── */
.form-section { margin-bottom:28px; }
.form-section-title {
    font-size:.75rem; text-transform:uppercase; letter-spacing:.08em;
    font-weight:700; color:var(--text-muted); margin-bottom:14px;
    display:flex; align-items:center; gap:8px;
}
.form-section-title::after { content:''; flex:1; height:1px; background:var(--border); }

.optional-badge {
    font-size:.68rem; font-weight:600; padding:2px 8px; border-radius:99px;
    background:#f1f5f9; color:#64748b; margin-left:6px; text-transform:none; letter-spacing:0;
}
</style>
<body>
<aside th:replace="~{fragments/layout :: sidebar}"></aside>
<div class="main-content">
    <div class="topbar">
        <h1 th:text="${venta.codigoVenta != null} ? 'Editar Venta #' + ${venta.codigoVenta} : 'Nueva Venta'"></h1>
        <a th:href="@{/ventas}" class="btn btn-secondary">Volver</a>
    </div>
    <div class="page-content">

        <div class="resumen-card" id="resumenCard">
            <h3>Resumen de la orden</h3>
            <div class="resumen-row"><span>Costo producto</span><span id="rCosto">Q. 0.00</span></div>
            <div class="resumen-row"><span>Costo envio</span><span id="rEnvio">Q. 0.00</span></div>
            <div class="resumen-total"><span>TOTAL</span><span id="rTotal">Q. 0.00</span></div>
        </div>

        <div class="card" style="max-width:900px;margin:0 auto">
            <form th:action="${venta.codigoVenta == null} ? @{/ventas} : @{/ventas/actualizar/{token}(token=${idToken})}" method="post">
                <input type="hidden" name="fechaVenta" th:value="${venta.fechaVenta}"/>

                <!-- Datos del pedido -->
                <div class="form-section">
                    <div class="form-section-title">Datos del pedido</div>
                    <div class="venta-form-grid">
                        <div class="form-group">
                            <label>Telefono de referencia</label>
                            <input type="tel" name="telefonoReferencia" class="form-control"
                                   th:value="${venta.telefonoReferencia}"
                                   placeholder="Ej. 5555-1234" required>
                        </div>
                        <div class="form-group">
                            <label>Numero de guia <span class="optional-badge">Opcional</span></label>
                            <input type="text" name="numeroGuia" class="form-control"
                                   th:value="${venta.numeroGuia}"
                                   placeholder="Ej. GU-20240001">
                        </div>
                        <div class="form-group full-width">
                            <label>Direccion de envio</label>
                            <input type="text" name="direccionEnvio" class="form-control"
                                   th:value="${venta.direccionEnvio}"
                                   placeholder="Calle, zona, municipio, departamento" required>
                        </div>
                    </div>
                </div>

                <!-- Estilo -->
                <div class="form-section">
                    <div class="form-section-title">Estilo del zapato</div>
                    <div class="estilo-cards">
                        <div class="estilo-card" th:each="e : ${estilos}">
                            <input type="radio"
                                   th:id="'est_' + ${e.name()}"
                                   name="estilo"
                                   th:value="${e.name()}"
                                   th:checked="${venta.estilo != null and venta.estilo == e}"
                                   required>
                            <label th:for="'est_' + ${e.name()}">
                                <span class="estilo-icon">&#128094;</span>
                                <span th:text="${e.etiqueta}"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Color -->
                <div class="form-section">
                    <div class="form-section-title">Color del zapato</div>
                    <div class="color-cards">
                        <div class="color-card" th:each="c : ${colores}">
                            <input type="radio"
                                   th:id="'col_' + ${c.name()}"
                                   name="color"
                                   th:value="${c.name()}"
                                   th:checked="${venta.color != null and venta.color == c}"
                                   required>
                            <label th:for="'col_' + ${c.name()}">
                                <span class="color-swatch" th:classappend="'swatch-' + ${c.name()}"></span>
                                <span th:text="${c.etiqueta}"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Talla -->
                <div class="form-section">
                    <div class="form-section-title">Numero de zapato</div>
                    <div class="talla-cards">
                        <div class="talla-card" th:each="t : ${tallasZapato}">
                            <input type="radio" th:id="'talla_'+${t}" name="numeroZapato" th:value="${t}"
                                   th:checked="${venta.numeroZapato == t}" required>
                            <label th:for="'talla_'+${t}" th:text="${t}"></label>
                        </div>
                    </div>
                </div>

                <!-- Precios -->
                <div class="form-section">
                    <div class="form-section-title">Precios</div>
                    <div class="venta-form-grid">
                        <div class="form-group">
                            <label>Costo del producto (Q.)</label>
                            <input type="number" step="0.01" min="0" name="costo" id="inputCosto"
                                   class="form-control" th:value="${venta.costo}" placeholder="0.00" required>
                        </div>
                        <div class="form-group">
                            <label>Costo de envio (Q.) <span class="optional-badge">Opcional</span></label>
                            <input type="number" step="0.01" min="0" name="costoEnvio" id="inputEnvio"
                                   class="form-control" th:value="${venta.costoEnvio}" placeholder="0.00">
                        </div>
                    </div>
                </div>

                <!-- Estado -->
                <div class="form-section">
                    <div class="form-section-title">Estado de la venta</div>
                    <div class="estado-pills">
                        <div class="estado-pill pill-PAGADO">
                            <input type="radio" id="est_PAGADO" name="estado" value="PAGADO"
                                   th:checked="${venta.estado == null or venta.estado.name() == 'PAGADO'}" required>
                            <label for="est_PAGADO">Pagado</label>
                        </div>
                        <div class="estado-pill pill-ENVIADO">
                            <input type="radio" id="est_ENVIADO" name="estado" value="ENVIADO"
                                   th:checked="${venta.estado != null and venta.estado.name() == 'ENVIADO'}">
                            <label for="est_ENVIADO">Enviado</label>
                        </div>
                        <div class="estado-pill pill-PEDIDO">
                            <input type="radio" id="est_PEDIDO" name="estado" value="PEDIDO"
                                   th:checked="${venta.estado != null and venta.estado.name() == 'PEDIDO'}">
                            <label for="est_PEDIDO">Pedido</label>
                        </div>
                        <div class="estado-pill pill-ENTREGADO">
                            <input type="radio" id="est_ENTREGADO" name="estado" value="ENTREGADO"
                                   th:checked="${venta.estado != null and venta.estado.name() == 'ENTREGADO'}">
                            <label for="est_ENTREGADO">Entregado</label>
                        </div>
                        <div class="estado-pill pill-DEVOLUCION">
                            <input type="radio" id="est_DEVOLUCION" name="estado" value="DEVOLUCION"
                                   th:checked="${venta.estado != null and venta.estado.name() == 'DEVOLUCION'}">
                            <label for="est_DEVOLUCION">Devolucion</label>
                        </div>
                        <div class="estado-pill pill-CANCELADO">
                            <input type="radio" id="est_CANCELADO" name="estado" value="CANCELADO"
                                   th:checked="${venta.estado != null and venta.estado.name() == 'CANCELADO'}">
                            <label for="est_CANCELADO">Cancelado</label>
                        </div>
                        <div class="estado-pill pill-INVENTARIO">
                            <input type="radio" id="est_INVENTARIO" name="estado" value="INVENTARIO"
                                   th:checked="${venta.estado != null and venta.estado.name() == 'INVENTARIO'}">
                            <label for="est_INVENTARIO">Inventario</label>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" style="padding:12px 32px;font-size:1rem;">
                        Guardar venta
                    </button>
                    <a th:href="@{/ventas}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
function actualizarResumen() {
    const costo = parseFloat(document.getElementById('inputCosto').value) || 0;
    const envioEl = document.getElementById('inputEnvio');
    const envio = envioEl && envioEl.value ? parseFloat(envioEl.value) || 0 : 0;
    document.getElementById('rCosto').textContent = 'Q. ' + costo.toFixed(2);
    document.getElementById('rEnvio').textContent = 'Q. ' + envio.toFixed(2);
    document.getElementById('rTotal').textContent = 'Q. ' + (costo + envio).toFixed(2);
}
document.getElementById('inputCosto').addEventListener('input', actualizarResumen);
const envioInput = document.getElementById('inputEnvio');
if (envioInput) envioInput.addEventListener('input', actualizarResumen);
actualizarResumen();
</script>
</body>
</html>
